<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><%= name %> - UCASH</title>
  <meta name="description" content="<%= description %>">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #8B5CF6;
      --secondary: #EC4899;
      --dark: #0D1117;
      --light: #C9D1D9;
      --border: #30363D;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #0D1117 100%);
      color: var(--light);
      line-height: 1.6;
      min-height: 100vh;
    }

    .ucash-header {
      background: rgba(30, 27, 75, 0.95);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
    }

    .ucash-nav {
      display: flex;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .ucash-nav a {
      color: var(--light);
      text-decoration: none;
    }

    .ucash-nav a:hover {
      color: var(--primary);
    }

    .ucash-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .hero {
      text-align: center;
      padding: 4rem 0;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.1));
      border-radius: 16px;
      margin-bottom: 3rem;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }

    .hero h1 {
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .generic-badge {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 25px;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .info {
      background: rgba(48, 54, 61, 0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .info h2 {
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .ucash-footer {
      background: rgba(30, 27, 75, 0.95);
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      margin-top: 3rem;
    }

    .ipfs-hash {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      opacity: 0.6;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <header class="ucash-header">
    <nav class="ucash-nav">
      <a href="https://u.cash">U.CASH</a>
      <a href="https://u.onl">U.ONL</a>
      <a href="https://un4.com">UN4</a>
    </nav>
  </header>

  <main class="ucash-main">
    <section class="hero">
      <span class="generic-badge">ENS Subname</span>
      <h1><%= name %>.ucash.eth</h1>
      <p><%= purpose %></p>
    </section>

    <section class="info">
      <h2>About</h2>
      <p><%= description %></p>
      <ul style="list-style: none; margin-top: 1rem;">
        <li style="padding: 0.5rem 0;">Subname: <%= name %></li>
        <li style="padding: 0.5rem 0;">Category: <%= category %></li>
        <li style="padding: 0.5rem 0;">Notes: <%= notes %></li>
        <li style="padding: 0.5rem 0;">Status: 🟡 Development</li>
      </ul>
    </section>
  </main>

  <footer class="ucash-footer">
    <p>&copy; 2026 UCASH. All rights reserved.</p>
    <p class="ipfs-hash">IPFS CID: <span id="ipfs-cid">Loading...</span></p>
  </footer>

  <script>
    const SUBNAME = '<%= name %>';
    trackEvent('pageview', { url: window.location.href });

    function trackEvent(action, data = {}) {
      fetch('https://analytics.u.onl/track', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subname: SUBNAME, action, timestamp: Date.now(), ...data })
      }).catch(() => {});
    }
  </script>
</body>
</html>
